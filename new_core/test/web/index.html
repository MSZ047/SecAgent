<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Security Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <style>
        /* 极致的平滑过渡动画 */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.6s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Thinking 呼吸动画 */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
        }
        .animate-thinking { animation: pulse-slow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#F8F9FA] text-[#111111] min-h-screen flex flex-col antialiased">

<div id="app" class="flex-grow flex flex-col">
    <transition name="fade" mode="out-in">
        
        <div v-if="state === 'input'" class="flex-grow flex items-center justify-center">
            <div class="w-full max-w-2xl px-6 flex flex-col items-center">
                <h1 class="text-4xl font-light tracking-tight mb-12">SecAgent</h1>
                <div class="relative w-full flex items-center shadow-sm rounded-full bg-white border border-gray-200 focus-within:border-gray-400 focus-within:ring-4 focus-within:ring-gray-100 transition-all duration-300">
                    <input 
                        v-model="targetUrl" 
                        @keyup.enter="startScan"
                        type="text" 
                        placeholder="请输入靶场 URL" 
                        class="w-full py-4 pl-8 pr-32 bg-transparent text-lg outline-none rounded-full placeholder-gray-400"
                    >
                    <button 
                        @click="startScan"
                        class="absolute right-2 top-2 bottom-2 px-6 bg-[#111111] text-white rounded-full hover:bg-gray-800 transition-colors duration-200 font-medium"
                    >
                        开始分析
                    </button>
                </div>
            </div>
        </div>

        <div v-else-if="state === 'thinking'" class="flex-grow flex items-center justify-center">
            <h2 class="text-5xl font-light tracking-widest text-gray-800 animate-thinking">Thinking...</h2>
        </div>

        <div v-else-if="state === 'result'" class="w-full max-w-6xl mx-auto py-16 px-6">
         <h2 class="text-3xl font-light mb-2">分析报告</h2>
            <p class="text-gray-500 mb-12">{{ targetUrl }}</p>

            <div v-if="scanData.length === 0" class="text-center py-24 bg-white rounded-3xl shadow-sm border border-gray-100 mb-12">
                <h3 class="text-2xl text-gray-400 font-light">本次分析未提取到任何有效数据项</h3>
            </div>

            <div v-else>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center mb-24">
                    <div v-if="scanData.length > 1" id="pie-chart" class="w-full h-[400px]"></div>
                    <div :class="scanData.length === 1 ? 'md:col-span-2 md:max-w-2xl md:mx-auto w-full' : ''">
                        <h3 class="text-xl font-medium mb-6 border-b pb-2">发现数据概览</h3>
                        <ul class="space-y-4">
                            <li v-for="(vuln, index) in scanData" :key="index" 
                                @click="scrollToReport(vuln.id)"
                                class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md hover:border-gray-200 transition-all">
                                <span class="font-medium text-lg">{{ vuln.name }}</span>
                                <span class="px-4 py-1 text-sm rounded-full text-white" :style="{ backgroundColor: getSeverityColor(vuln.severity) }">
                                    {{ vuln.severity }}
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="space-y-16">
                    <div v-for="(vuln, index) in scanData" :key="index" :id="vuln.id" class="bg-white rounded-3xl p-10 shadow-sm border border-gray-100 scroll-mt-8">
                        <div class="flex items-center space-x-4 mb-6">
                            <div class="w-4 h-8 rounded-full" :style="{ backgroundColor: getSeverityColor(vuln.severity) }"></div>
                            <h3 class="text-2xl font-semibold">{{ vuln.name }}</h3>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div class="md:col-span-1 space-y-6">
                                <div>
                                    <h4 class="text-sm text-gray-500 uppercase tracking-wider mb-2">发现位置</h4>
                                    <p class="text-gray-900 bg-gray-50 p-3 rounded-xl font-mono text-sm break-all">{{ vuln.location }}</p>
                                </div>
                                <div>
                                    <h4 class="text-sm text-gray-500 uppercase tracking-wider mb-2">数据级别</h4>
                                    <p class="font-medium" :style="{ color: getSeverityColor(vuln.severity) }">{{ vuln.severity }} (参考值: {{ vuln.score }}/10)</p>
                                </div>
                            </div>
                            
                            <div class="md:col-span-2 space-y-6">
                                <div>
                                    <h4 class="text-sm text-gray-500 uppercase tracking-wider mb-2">详细描述</h4>
                                    <p class="text-gray-700 leading-relaxed">{{ vuln.description }}</p>
                                </div>
                                <div class="bg-[#111111] text-[#F8F9FA] p-6 rounded-2xl">
                                    <h4 class="text-sm uppercase tracking-wider mb-3 text-gray-400">🛡️ 应对建议 (重点)</h4>
                                    <p class="leading-relaxed whitespace-pre-line">{{ vuln.defense }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <div class="mt-16 text-center">
                 <button @click="reset" class="px-8 py-3 bg-white border border-gray-300 text-gray-800 rounded-full hover:bg-gray-50 transition-colors font-medium">
                     分析新的目标
                 </button>
            </div>
        </div>

    </transition>
</div>

<script>
    const { createApp, ref, nextTick } = Vue;

    createApp({
        setup() {
            const state = ref('input'); 
            const targetUrl = ref('');
            const scanData = ref([]);
            let pollInterval = null; // 用于存储定时器

            const colors = {
                'Low': '#A3BCA9',      
                'Medium': '#8CA1B9',   
                'High': '#D6C592',     
                'Critical': '#C48A8A'  
            };

            const getSeverityColor = (severity) => colors[severity] || '#9ca3af';

            const startScan = async () => {
                if (!targetUrl.value.trim()) return;
                state.value = 'thinking';
                
                try {
                    // 1. 发起扫描请求，获取 task_id
                    // 注意：这里的 target_url 字段名要和你 FastAPI Schema 定义的一致
                    const response = await fetch('http://localhost:8000/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ target_url: targetUrl.value })
                    });
                    
                    const data = await response.json();
                    const taskId = data.task_id;
                    
                    // 2. 开始轮询查询结果
                    pollStatus(taskId);
                    
                } catch (error) {
                    console.error("启动扫描失败:", error);
                    alert("无法连接到后端，请确保 FastAPI 正在运行。");
                    state.value = 'input';
                }
            };

            const pollStatus = (taskId) => {
                pollInterval = setInterval(async () => {
                    try {
                        const response = await fetch(`http://localhost:8000/scan/${taskId}`);
                        const statusData = await response.json();
                        
                        if (statusData.status === 'completed') {
                            clearInterval(pollInterval);
                            
                            // 渲染后端翻译官生成的真实 JSON 数据
                            // 后端存入的 statusData.result 本身就是 JSON 数组格式
                            scanData.value = statusData.result; 
                            
                            state.value = 'result';
                            nextTick(() => { initChart(); });
                        } else if (statusData.status === 'failed') {
                            clearInterval(pollInterval);
                            alert("Agent 扫描失败: " + statusData.error);
                            state.value = 'input';
                        }
                        // 如果是 running，就继续等，什么都不做
                        
                    } catch (error) {
                        console.error("查询状态出错:", error);
                        clearInterval(pollInterval);
                    }
                }, 3000); // 每 3 秒问一次后端
            };

            const initChart = () => {
                const chartDom = document.getElementById('pie-chart');
                if (!chartDom) return;
                const myChart = echarts.init(chartDom);
                
                const pieData = scanData.value.map(item => ({
                    // 【修复核心 1】强制转成数字。如果大模型没传 score，保底给个 10，确保绝对能画出图形
                    value: parseFloat(item.score) || 10, 
                    name: item.name,
                    itemStyle: { color: getSeverityColor(item.severity) }
                }));

                const option = {
                    tooltip: { trigger: 'item' },
                    series: [{
                        name: '危害值',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        itemStyle: { borderRadius: 10, borderColor: '#F8F9FA', borderWidth: 4 },
                        // 【修复核心 2】如果只有一个数据，就把文字显示在圆环正中间，避免干瘪
                        label: { 
                            show: pieData.length === 1, 
                            position: 'center',
                            formatter: '{b}',
                            fontSize: 16,
                            color: '#666'
                        },
                        data: pieData
                    }]
                };
                myChart.setOption(option);
                window.addEventListener('resize', () => myChart.resize());
            };

            const scrollToReport = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const reset = () => {
                state.value = 'input';
                targetUrl.value = '';
            };

            return { state, targetUrl, scanData, startScan, scrollToReport, reset, getSeverityColor };
        }
    }).mount('#app');
</script>
</body>
</html>
