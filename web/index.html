<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>SecAgent · AI 安全分析</title>

  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/app.css" />

  <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header id="topbar" class="topbar hidden">
      <div class="topbar-left">
        <button id="backBtn" class="icon-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="url-pill" id="urlPill">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:14px;height:14px;margin-right:6px;opacity:0.6">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>-</span>
        </div>
      </div>
      <div class="topbar-right">
        <span id="statusBadge" class="status-badge">
          <span class="status-dot"></span>
          待命
        </span>
      </div>
    </header>

    <main class="main-stage">
      <section id="homeView" class="home-view">
        <div class="hero-card">
          <div class="brand-logo">
            <svg class="brand-svg" viewBox="-5 -5 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" overflow="visible">
              <defs>
                <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#06b6d4"/>
                  <stop offset="100%" stop-color="#8b5cf6"/>
                </linearGradient>
                <filter id="brandGlow" x="-100%" y="-100%" width="300%" height="300%">
                  <feGaussianBlur stdDeviation="3.5" result="blur"/>
                  <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="1.5" result="shadowBlur"/>
                  <feOffset dx="0" dy="1" result="shadowOffset"/>
                  <feComponentTransfer in="shadowOffset">
                    <feFuncA type="linear" slope="0.4"/>
                  </feComponentTransfer>
                  <feMerge>
                    <feMergeNode in="shadowOffset"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              
              <path class="brand-shield" d="M24 4L6 12v12c0 11.04 7.68 22.44 18 26 10.32-3.56 18-14.96 18-26V12L24 4z" fill="url(#brandGrad)" filter="url(#brandGlow)"/>
              
              <path d="M24 10l-12 6v9c0 8.28 5.16 16.02 12 18.84 6.84-2.82 12-10.56 12-18.84v-9l-12-6z" fill="rgba(255,255,255,0.2)"/>
              
              <circle cx="24" cy="22" r="6.5" fill="white" filter="url(#softShadow)" opacity="0.95"/>
              <circle cx="24" cy="22" r="5" fill="url(#brandGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
              
              <circle cx="24" cy="22" r="2.2" fill="white"/>
              
              <circle class="brand-top-dot" cx="24" cy="6" r="2" fill="#06b6d4"/>
              
              <circle class="brand-glow" cx="24" cy="22" r="12" fill="url(#brandGrad)" filter="url(#brandGlow)"/>
              
              <circle class="brand-pulse" cx="24" cy="22" r="18" fill="transparent" stroke="url(#brandGrad)" stroke-width="0.5"/>
            </svg>
          </div>
          
          <h1 class="hero-title">
            <span class="title-main">SecAgent</span>
          </h1>
          
          <p class="hero-subtitle">
            <span class="subtitle-text">智能分析网页安全风险 · 实时检测威胁因子</span>
          </p>

          <div id="urlInputMount"></div>

          <div class="hero-features">
            <div class="feature-item">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 6v6c0 5.55 3.4 10.74 8 12 4.6-1.26 8-6.45 8-12V6l-8-4z" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M9 12l2 2 4-4" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>智能检测</span>
            </div>
            <div class="feature-item">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="3" stroke="#8b5cf6" stroke-width="1.5"/>
                <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              <span>深度分析</span>
            </div>
            <div class="feature-item">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#06b6d4" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
              <span>实时响应</span>
            </div>
          </div>

          <p class="hero-tip">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:14px;height:14px">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            当前版本为前端原型 · 分析结果由模拟数据生成
          </p>
        </div>
      </section>

      <section id="workspaceView" class="workspace-view hidden">
        <div id="contentMount" class="content-mount"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
